{% comment %}
  CSV Import / Export 버튼 컴포넌트 (항목 J)
  사용: instance 데이터 파일 업로드/다운로드
{% endcomment %}

{% if show_csv_buttons %}
<div class="card shadow-sm mb-4">
    <div class="card-header bg-light fw-bold">
        <i class="bi bi-arrow-left-right"></i> CSV Import / Export
    </div>
    <div class="card-body">
        <div class="row g-3 align-items-center">
            <!-- Export (Download) -->
            <div class="col-auto">
                <span class="badge bg-secondary me-1">Export</span>
                <a href="{% url 'instance:csv_download' instance_name=instance_name filename=current_file %}"
                   class="btn btn-sm btn-outline-primary">
                    <i class="bi bi-download"></i> Download CSV
                </a>
            </div>

            <div class="col-auto px-0"><span class="text-muted">|</span></div>

            <!-- Import (Upload) -->
            <div class="col-auto">
                <span class="badge bg-secondary me-1">Import</span>
                <form method="post" enctype="multipart/form-data" class="d-inline" id="csvUploadForm"
                      action="{% url 'instance:csv_upload' instance_name=instance_name filename=current_file %}">
                    {% csrf_token %}
                    <input type="file" name="csv_file" accept=".csv" class="d-none" id="csvFileInput"
                        onchange="document.getElementById('csvUploadForm').submit();">
                    <button type="button" class="btn btn-sm btn-outline-success"
                        onclick="document.getElementById('csvFileInput').click();">
                        <i class="bi bi-upload"></i> Upload CSV
                    </button>
                </form>
            </div>

            <div class="col-auto ms-auto">
                <small class="text-muted">
                    <i class="bi bi-info-circle"></i> Download → Edit → Upload
                </small>
            </div>
        </div>
    </div>
</div>
{% endif %}
