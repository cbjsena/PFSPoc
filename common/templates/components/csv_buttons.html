{% if show_csv_buttons %}
<div class="d-flex gap-2">
    {% if download_url %}
    <a href="{{ download_url }}" class="btn btn-sm btn-outline-primary">
        <i class="bi bi-download"></i> Download CSV
    </a>
    {% else %}
    <a href="{% url 'instance:csv_download' instance_name=instance_name filename=current_file %}" class="btn btn-sm btn-outline-primary">
        <i class="bi bi-download"></i> Download CSV
    </a>
    {% endif %}

    {% if upload_url %}
    <form method="post" enctype="multipart/form-data" class="d-inline" id="csvUploadForm" action="{{ upload_url }}">
        {% csrf_token %}
        <input type="file" name="csv_file" accept=".csv" class="d-none" id="csvFileInput" onchange="document.getElementById('csvUploadForm').submit();">
        <button type="button" class="btn btn-sm btn-outline-success" onclick="document.getElementById('csvFileInput').click();">
            <i class="bi bi-upload"></i> Upload CSV
        </button>
    </form>
    {% else %}
    <form method="post" enctype="multipart/form-data" class="d-inline" id="csvUploadForm" action="{% url 'instance:csv_upload' instance_name=instance_name filename=current_file %}">
        {% csrf_token %}
        <input type="file" name="csv_file" accept=".csv" class="d-none" id="csvFileInput" onchange="document.getElementById('csvUploadForm').submit();">
        <button type="button" class="btn btn-sm btn-outline-success" onclick="document.getElementById('csvFileInput').click();">
            <i class="bi bi-upload"></i> Upload CSV
        </button>
    </form>
    {% endif %}
</div>
{% endif %}
